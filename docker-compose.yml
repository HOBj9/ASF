# Docker Compose Configuration for Waste Management System
# This file is configured for local development environment
# For production, use docker-compose.prod.yml

services:
  # MongoDB Database Service (Waste Management System)
  mongodb:
    image: mongo:7
    container_name: waste-management-system-mongodb
    restart: unless-stopped
    ports:
      - "127.0.0.1:27018:27017"  # Host 27018 to avoid conflict with local MongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: waste-management-system
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  # Application Service (Waste Management System)
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: waste-management-system-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:3036:3036"  # Bind to localhost only
    environment:
      # MongoDB connection (inside Docker network)
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/waste-management-system?authSource=admin
      # Application URL
      NEXTAUTH_URL: http://localhost:3036
      NEXTAUTH_SECRET: local-development-secret-key-change-in-production
      # Enable file watching in Docker
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - mongodb
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge

