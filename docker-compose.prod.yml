services:
  mongodb:
    image: mongo:7
    container_name: waste-management-system-mongodb
    restart: unless-stopped
    ports:
      - "27018:27017"  # Host 27018 to avoid conflict with local MongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: waste-management-system
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: waste-management-system-app
    restart: unless-stopped
    ports:
      - "3036:3036"
    environment:
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/waste-management-system?authSource=admin
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://wms.alather.net}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-your-secret-key-change-in-production}
    depends_on:
      - mongodb
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge

