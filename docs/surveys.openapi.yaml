openapi: 3.1.0
info:
  title: Waste Management System Surveys and Classifications API
  version: 1.0.0
  summary: Surveys, submissions, and point classifications APIs
  description: |
    OpenAPI reference for surveys, survey submissions, and point classifications.
    It includes:
    - internal organization survey management
    - mobile survey consumption and submission
    - primary and secondary point classifications
    - converting survey submissions to points
    - converting survey submissions to points and Athar zones
servers:
  - url: /
    description: Same host as the Next.js application
tags:
  - name: Point Classifications
  - name: Surveys
  - name: Survey Submissions
  - name: Mobile Surveys
paths:
  /api/organizations/{id}/point-classifications/primary:
    get:
      tags: [Point Classifications]
      summary: List primary classifications for an organization
      operationId: listOrganizationPrimaryPointClassifications
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      responses:
        '200':
          description: Primary classifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  primaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/PointClassificationSummary'
              example:
                primaries:
                  - id: 68010001d2f9b54dd82b6001
                    name: container
                    nameAr: حاوية
                    primaryClassificationId: null
                    branchId: null
                    organizationId: 69afecbba6a0fb6ab38efa05
                    order: 1
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      tags: [Point Classifications]
      summary: Create a primary classification for an organization
      operationId: createOrganizationPrimaryPointClassification
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PointClassificationCreateRequest'
            example:
              name: container
              nameAr: حاوية
              order: 1
      responses:
        '201':
          description: Primary classification created
          content:
            application/json:
              schema:
                type: object
                properties:
                  primary:
                    $ref: '#/components/schemas/PointClassificationSummary'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/point-classifications/secondary:
    get:
      tags: [Point Classifications]
      summary: List secondary classifications for an organization
      description: |
        Use `primaryClassificationId` to filter secondaries that belong to one primary classification.
      operationId: listOrganizationSecondaryPointClassifications
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/PrimaryClassificationIdQuery'
      responses:
        '200':
          description: Secondary classifications
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/PointClassificationSummary'
              example:
                secondaries:
                  - id: 68010001d2f9b54dd82b6002
                    name: household
                    nameAr: منزلي
                    primaryClassificationId: 68010001d2f9b54dd82b6001
                    branchId: null
                    organizationId: 69afecbba6a0fb6ab38efa05
                    order: 1
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      tags: [Point Classifications]
      summary: Create a secondary classification for an organization
      operationId: createOrganizationSecondaryPointClassification
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf:
                - $ref: '#/components/schemas/PointClassificationCreateRequest'
                - type: object
                  required: [primaryClassificationId]
                  properties:
                    primaryClassificationId:
                      type: string
            example:
              name: household
              nameAr: منزلي
              primaryClassificationId: 68010001d2f9b54dd82b6001
              order: 1
      responses:
        '201':
          description: Secondary classification created
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondary:
                    $ref: '#/components/schemas/PointClassificationSummary'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/point-classifications/primary:
    get:
      tags: [Mobile Surveys]
      summary: List primary classifications from the authenticated supervisor token
      description: |
        The API resolves the supervisor organization and branch from `Authorization: Bearer <token>`.
        The client must not send organizationId or branchId.
      operationId: listMobilePrimaryPointClassifications
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      responses:
        '200':
          description: Primary classifications for the authenticated supervisor scope
          content:
            application/json:
              schema:
                type: object
                properties:
                  primaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/PointClassificationSummary'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          description: Supervisor token is valid, but no organization is assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileErrorResponse'
              example:
                message: لا توجد مؤسسة مرتبطة بحساب مشرف الخط
                code: MOBILE_ORGANIZATION_NOT_ASSIGNED
                status: 403
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/point-classifications/secondary:
    get:
      tags: [Mobile Surveys]
      summary: List secondary classifications from the authenticated supervisor token
      description: |
        The API resolves the supervisor organization and branch from the bearer token.
        Use `primaryClassificationId` to load only the secondaries under one primary classification.
      operationId: listMobileSecondaryPointClassifications
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PrimaryClassificationIdQuery'
      responses:
        '200':
          description: Secondary classifications for the authenticated supervisor scope
          content:
            application/json:
              schema:
                type: object
                properties:
                  secondaries:
                    type: array
                    items:
                      $ref: '#/components/schemas/PointClassificationSummary'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/MobileOrganizationNotAssigned'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/surveys:
    get:
      tags: [Surveys]
      summary: List organization surveys
      description: |
        Returns surveys for the selected organization.
        Branch admins and line supervisors receive organization-wide surveys plus surveys scoped to their branch.
      operationId: listOrganizationSurveys
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - in: query
          name: activeOnly
          required: false
          schema:
            type: boolean
          description: Return only active surveys when true
      responses:
        '200':
          description: Surveys list
          content:
            application/json:
              schema:
                type: object
                properties:
                  surveys:
                    type: array
                    items:
                      $ref: '#/components/schemas/Survey'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'
    post:
      tags: [Surveys]
      summary: Create a survey
      operationId: createOrganizationSurvey
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveyCreateRequest'
      responses:
        '201':
          description: Survey created
          content:
            application/json:
              schema:
                type: object
                properties:
                  survey:
                    $ref: '#/components/schemas/Survey'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/surveys/{surveyId}:
    get:
      tags: [Surveys]
      summary: Get one survey
      operationId: getOrganizationSurvey
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SurveyId'
      responses:
        '200':
          description: Survey details
          content:
            application/json:
              schema:
                type: object
                properties:
                  survey:
                    $ref: '#/components/schemas/Survey'
        '403':
          description: Survey exists but is outside the current branch scope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    patch:
      tags: [Surveys]
      summary: Update a survey
      operationId: updateOrganizationSurvey
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SurveyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SurveyUpdateRequest'
      responses:
        '200':
          description: Updated survey
          content:
            application/json:
              schema:
                type: object
                properties:
                  survey:
                    $ref: '#/components/schemas/Survey'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
    delete:
      tags: [Surveys]
      summary: Delete a survey
      operationId: deleteOrganizationSurvey
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SurveyId'
      responses:
        '200':
          description: Survey deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
              example:
                success: true
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/surveys/{surveyId}:
    get:
      tags: [Mobile Surveys]
      summary: Get one mobile survey with classifications
      description: |
        Loads the survey plus the point classifications available to the authenticated line supervisor.
        Classifications are resolved from the supervisor token scope.
      operationId: getMobileSurveyWithClassificationContext
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SurveyId'
      responses:
        '200':
          description: Survey details and submission template
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSurveyDetailResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/surveys/{surveyId}/submit:
    post:
      tags: [Mobile Surveys]
      summary: Submit survey answers from mobile
      description: |
        Creates a submission and creates or links a point in the system.

        Scenarios:
        - missing required answer -> 400
        - invalid choice answer -> 400
        - survey not found or inactive -> 404
        - survey outside supervisor branch scope -> 403
        - invalid classification ids -> 400
      operationId: submitMobileSurvey
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/SurveyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSurveySubmitRequest'
      responses:
        '201':
          description: Survey submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSurveySubmitResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/surveys/{surveyId}/submit:
    post:
      tags: [Survey Submissions]
      summary: Submit a survey from the internal dashboard
      operationId: submitOrganizationSurvey
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SurveyId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InternalSurveySubmitRequest'
      responses:
        '201':
          description: Submission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalSurveySubmitResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/surveys/{surveyId}/submissions:
    get:
      tags: [Survey Submissions]
      summary: List submissions for one survey
      operationId: listSurveySubmissions
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SurveyId'
      responses:
        '200':
          description: Survey submissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SurveySubmission'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/survey-submissions:
    get:
      tags: [Survey Submissions]
      summary: List survey submissions across the organization
      operationId: listOrganizationSurveySubmissions
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - in: query
          name: surveyId
          required: false
          schema:
            type: string
          description: Optional survey filter. Use `all` or omit to return every survey.
      responses:
        '200':
          description: Organization survey submissions
          content:
            application/json:
              schema:
                type: object
                properties:
                  submissions:
                    type: array
                    items:
                      $ref: '#/components/schemas/SurveySubmission'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/survey-submissions/{submissionId}/convert-to-point:
    post:
      tags: [Survey Submissions]
      summary: Convert one submission to a point
      description: |
        If the submission already has a linked point, the API returns the existing point.
      operationId: convertSurveySubmissionToPoint
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: Point created or reused
          content:
            application/json:
              schema:
                type: object
                properties:
                  point:
                    type: object
                  message:
                    type: string
              example:
                point:
                  _id: 68020001d2f9b54dd82b7002
                  name: Point A12
                message: تم إنشاء النقطة وربطها بالرد
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/organizations/{id}/survey-submissions/{submissionId}/convert-to-point-and-athar:
    post:
      tags: [Survey Submissions]
      summary: Convert one submission to a point and push Athar zones
      operationId: convertSurveySubmissionToPointAndAthar
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OrganizationId'
        - $ref: '#/components/parameters/SubmissionId'
      responses:
        '200':
          description: Submission converted and Athar push attempted
          content:
            application/json:
              schema:
                type: object
                properties:
                  point:
                    type: object
                  pushed:
                    type: object
                  zonesCreated:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: custom-mobile-token
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
    secureSessionCookieAuth:
      type: apiKey
      in: cookie
      name: __Secure-next-auth.session-token
  parameters:
    OrganizationId:
      in: path
      name: id
      required: true
      schema:
        type: string
    SurveyId:
      in: path
      name: surveyId
      required: true
      schema:
        type: string
    SubmissionId:
      in: path
      name: submissionId
      required: true
      schema:
        type: string
    PrimaryClassificationIdQuery:
      in: query
      name: primaryClassificationId
      required: false
      schema:
        type: string
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error401:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - $ref: '#/components/schemas/MobileErrorResponse'
    Error404:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '#/components/schemas/ErrorResponse'
              - $ref: '#/components/schemas/MobileErrorResponse'
    MobileOrganizationNotAssigned:
      description: The authenticated supervisor has no linked organization
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MobileErrorResponse'
          example:
            message: لا توجد مؤسسة مرتبطة بحساب مشرف الخط
            code: MOBILE_ORGANIZATION_NOT_ASSIGNED
            status: 403
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    MobileErrorResponse:
      type: object
      required: [message, code, status]
      properties:
        message:
          type: string
        code:
          type: string
        status:
          type: integer
    PointClassificationSummary:
      type: object
      required: [id, name, order]
      properties:
        id:
          type: string
        name:
          type: string
        nameAr:
          type: [string, 'null']
        primaryClassificationId:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        organizationId:
          type: [string, 'null']
        order:
          type: integer
    PointClassificationCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        nameAr:
          type: [string, 'null']
        order:
          type: integer
    SurveyQuestion:
      type: object
      properties:
        _id:
          type: [string, 'null']
        questionText:
          type: string
        questionTextAr:
          type: [string, 'null']
        type:
          type: string
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
    Survey:
      type: object
      properties:
        _id:
          type: string
        organizationId:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        title:
          type: string
        titleAr:
          type: [string, 'null']
        description:
          type: [string, 'null']
        descriptionAr:
          type: [string, 'null']
        isActive:
          type: boolean
        questions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyQuestion'
    SurveyCreateRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
        titleAr:
          type: [string, 'null']
        description:
          type: [string, 'null']
        descriptionAr:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        isActive:
          type: boolean
        questions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyQuestion'
    SurveyUpdateRequest:
      type: object
      properties:
        title:
          type: string
        titleAr:
          type: [string, 'null']
        description:
          type: [string, 'null']
        descriptionAr:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        isActive:
          type: boolean
        questions:
          type: array
          items:
            $ref: '#/components/schemas/SurveyQuestion'
    SurveySubmission:
      type: object
      properties:
        _id:
          type: string
        surveyId:
          oneOf:
            - type: string
            - type: object
        userId:
          type: [string, 'null']
        organizationId:
          type: string
        branchId:
          type: [string, 'null']
        pointId:
          type: [string, 'null']
        answers:
          type: object
          additionalProperties: true
        mapLat:
          type: number
        mapLng:
          type: number
        deviceLat:
          type: [number, 'null']
        deviceLng:
          type: [number, 'null']
        convertedToAthar:
          type: boolean
    InternalSurveySubmitRequest:
      type: object
      required: [mapLat, mapLng, answers]
      properties:
        mapLat:
          type: number
        mapLng:
          type: number
        deviceLat:
          type: [number, 'null']
        deviceLng:
          type: [number, 'null']
        answers:
          type: object
          additionalProperties: true
    InternalSurveySubmitResponse:
      type: object
      properties:
        submission:
          $ref: '#/components/schemas/SurveySubmission'
        point:
          type: object
    MobileSurveyQuestion:
      type: object
      properties:
        id:
          type: [string, 'null']
        index:
          type: integer
        answerKey:
          type: string
        type:
          type: string
        questionText:
          type: string
        questionTextAr:
          type: [string, 'null']
        options:
          type: array
          items:
            type: string
        required:
          type: boolean
    MobileSurveyAnswerItem:
      type: object
      required: [value]
      properties:
        questionId:
          type: [string, 'null']
        answerKey:
          type: [string, 'null']
        value:
          description: |
            Can be text, number, choice value, or a location object depending on the survey question type.
    MobileSurveySubmitRequest:
      type: object
      required: [point, answers]
      properties:
        point:
          type: object
          required:
            - name
            - primaryClassificationId
            - secondaryClassificationId
            - otherIdentifier
            - mapLat
            - mapLng
          properties:
            name:
              type: string
