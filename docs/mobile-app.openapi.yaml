openapi: 3.1.0
info:
  title: Waste Management System Mobile API
  version: 1.0.0
  summary: Mobile surveys and mobile tracking APIs for line supervisors
  description: |
    Unified OpenAPI contract for the mobile app.
    It covers:
    - line supervisor mobile login
    - line supervisor profile and assignment details
    - survey download and submission
    - mobile tracking status, ingestion, and deactivation
    - tracking admin monitoring endpoints
servers:
  - url: /
tags:
  - name: Mobile Auth
  - name: Mobile Profile
  - name: Mobile Surveys
  - name: Mobile Tracking
  - name: Tracking Admin
paths:
  /api/tracking/mobile/login:
    post:
      tags: [Mobile Auth]
      summary: Login for the mobile app
      description: |
        Authenticates a line supervisor and returns a bearer token that is used for:
        - listing available surveys
        - loading a survey with its answer instructions
        - submitting survey answers
        - sending mobile tracking batches
      operationId: mobileLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileLoginRequest'
            example:
              email: supervisor@example.com
              password: secret123
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileLoginResponse'
              example:
                accessToken: eyJzdWIiOiIxMjM0NSJ9.signature
                tokenType: Bearer
                expiresAt: '2026-04-06T10:00:00.000Z'
                user:
                  id: 67ea5cd0d2f9b54dd82b4310
                  name: Ahmed Supervisor
                  email: supervisor@example.com
                  role: line_supervisor
                  organizationId: 67ea5ab9d2f9b54dd82b4301
                  branchId: 67ea5b11d2f9b54dd82b4307
                  trackingVehicleId: 67ea5d5dd2f9b54dd82b4323
                tracking:
                  canActivate: true
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/me:
    get:
      tags: [Mobile Profile]
      summary: Get the authenticated line supervisor profile
      description: |
        Returns the current line supervisor information together with the linked organization,
        branch, and assigned vehicle details when available.
      operationId: getMobileLineSupervisorProfile
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      responses:
        '200':
          description: Authenticated line supervisor profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileLineSupervisorProfileResponse'
              example:
                user:
                  id: 67ea5cd0d2f9b54dd82b4310
                  name: Ahmed Supervisor
                  email: supervisor@example.com
                  role: line_supervisor
                  organizationId: 67ea5ab9d2f9b54dd82b4301
                  branchId: 67ea5b11d2f9b54dd82b4307
                  trackingVehicleId: 67ea5d5dd2f9b54dd82b4323
                  isActive: true
                organization:
                  id: 67ea5ab9d2f9b54dd82b4301
                  name: Damascus Cleanliness Directorate
                  slug: damascus-cleanliness
                branch:
                  id: 67ea5b11d2f9b54dd82b4307
                  name: Branch 01
                  nameAr: ЩҒШұШ№ 01
                  branchTypeLabel: Urban
                vehicle:
                  id: 67ea5d5dd2f9b54dd82b4323
                  name: Route 12 Vehicle
                  plateNumber: '123456'
                  trackingProvider: mobile_app
                  acceptedTrackingProviders:
                    - athar
                    - mobile_app
                  zoneEventProvider: mobile_app
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/surveys:
    get:
      tags: [Mobile Surveys]
      summary: List active surveys available to the authenticated line supervisor
      description: |
        Returns only the surveys visible to the authenticated line supervisor according to:
        - the bearer token identity
        - the supervisor organization
        - the supervisor branch scope

        Use the returned `id` to request the full survey details from `/api/mobile/surveys/{surveyId}`.
      operationId: listMobileSurveys
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      responses:
        '200':
          description: Surveys list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSurveyListResponse'
              example:
                surveys:
                  - id: 67fe0001d2f9b54dd82b5001
                    organizationId: 69afecbba6a0fb6ab38efa05
                    branchId: 69afecf2a6a0fb6ab38efa36
                    title: New collection point survey
                    titleAr: Ш§ШіШӘШЁЩҠШ§ЩҶ ЩҶЩӮШ·Ш© ШӘШ¬Щ…ЩҠШ№ Ш¬ШҜЩҠШҜШ©
                    description: Create a new collection point from the mobile app
                    descriptionAr: ШҘЩҶШҙШ§ШЎ ЩҶЩӮШ·Ш© ШӘШ¬Щ…ЩҠШ№ Ш¬ШҜЩҠШҜШ© Щ…ЩҶ ШӘШ·ШЁЩҠЩӮ Ш§Щ„Щ…ЩҲШЁШ§ЩҠЩ„
                    questionCount: 3
                    isActive: true
                    updatedAt: '2026-04-05T08:15:00.000Z'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/point-classifications:
    get:
      tags: [Mobile Surveys]
      summary: Get nested point classifications for the authenticated line supervisor
      description: |
        Returns primary classifications; each item includes a `secondaries` array for that primary.
        Scoped by the authenticated supervisor organization and branch (from the bearer token).
        Do not send organizationId or branchId.

        Optional query `primaryClassificationId`: return only the primary whose `id` matches
        (still nested, with its `secondaries`).
      operationId: listMobilePointClassifications
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - in: query
          name: primaryClassificationId
          required: false
          schema:
            type: string
          description: Optional filter вҖ” return only one primary (with its secondaries)
      responses:
        '200':
          description: Nested point classifications for point creation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilePointClassificationsResponse'
              example:
                primaries:
                  - id: 68010001d2f9b54dd82b6001
                    name: container
                    nameAr: ГҳВӯГҳВ§ГҷЛҶГҷЕ ГҳВ©
                    primaryClassificationId: null
                    branchId: 69afecf2a6a0fb6ab38efa36
                    organizationId: 69afecbba6a0fb6ab38efa05
                    order: 1
                    secondaries:
                      - id: 68010001d2f9b54dd82b6002
                        name: household
                        nameAr: ГҷвҖҰГҷвҖ ГҳВІГҷвҖһГҷЕ 
                        primaryClassificationId: 68010001d2f9b54dd82b6001
                        branchId: 69afecf2a6a0fb6ab38efa36
                        organizationId: 69afecbba6a0fb6ab38efa05
                        order: 1
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/surveys/{surveyId}:
    get:
      tags: [Mobile Surveys]
      summary: Get survey details with question keys and point classifications
      description: |
        Returns the selected survey plus everything the mobile client needs to answer it:
        - ordered questions
        - `answerKey` for each question
        - classification lists required for point creation
        - required point fields

        Nested classification lists (`primaries` with `secondaries` under each) match `/api/mobile/point-classifications`.

        Answering rules:
        - send either `questionId` or `answerKey` for each answer item
        - for `choice` questions, `value` must be one of the listed `options`
        - for `current_location`, the API can use the point coordinates when no dedicated answer value is sent
      operationId: getMobileSurvey
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - in: path
          name: surveyId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Survey details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSurveyDetailResponse'
              example:
                survey:
                  id: 67fe0001d2f9b54dd82b5001
                  organizationId: 69afecbba6a0fb6ab38efa05
                  branchId: 69afecf2a6a0fb6ab38efa36
                  title: New collection point survey
                  titleAr: Ш§ШіШӘШЁЩҠШ§ЩҶ ЩҶЩӮШ·Ш© ШӘШ¬Щ…ЩҠШ№ Ш¬ШҜЩҠШҜШ©
                  description: Create a new collection point from the mobile app
                  descriptionAr: ШҘЩҶШҙШ§ШЎ ЩҶЩӮШ·Ш© ШӘШ¬Щ…ЩҠШ№ Ш¬ШҜЩҠШҜШ© Щ…ЩҶ ШӘШ·ШЁЩҠЩӮ Ш§Щ„Щ…ЩҲШЁШ§ЩҠЩ„
                  isActive: true
                  updatedAt: '2026-04-05T08:15:00.000Z'
                  questions:
                    - id: 67fe0101d2f9b54dd82b5101
                      index: 0
                      answerKey: question_0
                      type: text
                      questionText: Point note
                      questionTextAr: Щ…Щ„Ш§ШӯШёШ© Ш№Щ„Щү Ш§Щ„ЩҶЩӮШ·Ш©
                      options: []
                      required: false
                    - id: 67fe0101d2f9b54dd82b5102
                      index: 1
                      answerKey: question_1
                      type: choice
                      questionText: Container condition
                      questionTextAr: ШӯШ§Щ„Ш© Ш§Щ„ШӯШ§ЩҲЩҠШ©
                      options:
                        - good
                        - needs_maintenance
                        - damaged
                      required: true
                    - id: 67fe0101d2f9b54dd82b5103
                      index: 2
                      answerKey: question_2
                      type: current_location
                      questionText: Current location
                      questionTextAr: Ш§Щ„Щ…ЩҲЩӮШ№ Ш§Щ„ШӯШ§Щ„ЩҠ
                      options: []
                      required: true
                submissionTemplate:
                  pointFields:
                    required:
                      - name
                      - primaryClassificationId
                      - secondaryClassificationId
                      - otherIdentifier
                      - mapLat
                      - mapLng
                  classifications:
                    primaries:
                      - id: 68010001d2f9b54dd82b6001
                        name: container
                        nameAr: ШӯШ§ЩҲЩҠШ©
                        primaryClassificationId: null
                        branchId: 69afecf2a6a0fb6ab38efa36
                        organizationId: 69afecbba6a0fb6ab38efa05
                        order: 1
                        secondaries:
                          - id: 68010001d2f9b54dd82b6002
                            name: household
                            nameAr: Щ…ЩҶШІЩ„ЩҠ
                            primaryClassificationId: 68010001d2f9b54dd82b6001
                            branchId: 69afecf2a6a0fb6ab38efa36
                            organizationId: 69afecbba6a0fb6ab38efa05
                            order: 1
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/mobile/surveys/{surveyId}/submit:
    post:
      tags: [Mobile Surveys]
      summary: Submit survey answers from mobile
      description: |
        Submits survey answers for the authenticated line supervisor and creates the point described in the request.

        How to answer:
        - fill the `point` object with the required point creation fields
        - send one item per answered survey question inside `answers`
        - use either `questionId` or `answerKey`
        - for `choice` questions, `value` must match one of the options from the survey details endpoint
        - for `current_location`, you may send the location through the point coordinates, or send a question answer value
      operationId: submitMobileSurvey
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - in: path
          name: surveyId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileSurveySubmitRequest'
            example:
              point:
                name: Container A-12
                primaryClassificationId: 68010001d2f9b54dd82b6001
                secondaryClassificationId: 68010001d2f9b54dd82b6002
                otherIdentifier: CNT-A12
                mapLat: 33.5138
                mapLng: 36.2765
              answers:
                - questionId: 67fe0101d2f9b54dd82b5101
                  answerKey: question_0
                  value: Near the main street
                - questionId: 67fe0101d2f9b54dd82b5102
                  answerKey: question_1
                  value: good
                - questionId: 67fe0101d2f9b54dd82b5103
                  answerKey: question_2
                  value:
                    lat: 33.5138
                    lng: 36.2765
      responses:
        '201':
          description: Survey submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileSurveySubmitResponse'
              example:
                submission:
                  _id: 68020001d2f9b54dd82b7001
                  surveyId: 67fe0001d2f9b54dd82b5001
                  userId: 69ca816dab6441549b3bca06
                  organizationId: 69afecbba6a0fb6ab38efa05
                  branchId: 69afecf2a6a0fb6ab38efa36
                  mapLat: 33.5138
                  mapLng: 36.2765
                  pointId: 68020001d2f9b54dd82b7002
                  createdAt: '2026-04-06T09:10:00.000Z'
                point:
                  _id: 68020001d2f9b54dd82b7002
                  name: Container A-12
                  lat: 33.5138
                  lng: 36.2765
                  organizationId: 69afecbba6a0fb6ab38efa05
                  branchId: null
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/mobile/status:
    get:
      tags: [Mobile Tracking]
      summary: Get current mobile tracking status
      operationId: getMobileTrackingStatus
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      responses:
        '200':
          description: Mobile tracking status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTrackingStatusResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/mobile/activate:
    post:
      tags: [Mobile Tracking]
      summary: Legacy device activation
      description: |
        Legacy compatibility endpoint.

        New mobile clients can login and send GPS batches directly to `/api/tracking/mobile/ingest`
        using the mobile bearer token without calling this endpoint first.
      operationId: activateMobileTracking
      deprecated: true
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileActivateRequest'
      responses:
        '201':
          description: Device activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileActivateResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/mobile/ingest:
    post:
      tags: [Mobile Tracking]
      summary: Ingest a GPS batch from the mobile application
      description: |
        Standard flow:
        1. Login using `/api/tracking/mobile/login`
        2. Send GPS batches directly to this endpoint with `Authorization: Bearer <accessToken>`

        `X-Tracking-Token` is still accepted for legacy clients but is no longer required for new ones.
      operationId: ingestMobileTrackingBatch
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
        - trackingTokenHeader: []
      parameters:
        - in: header
          name: X-Tracking-Token
          required: false
          schema:
            type: string
          description: Legacy tracking token returned by `/api/tracking/mobile/activate`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTrackingBatchRequest'
            example:
              deviceId: android-device-001
              deviceName: Samsung A55
              platform: android
              appVersion: 1.0.0
              batchId: batch-20260330-001
              sentAt: '2026-03-30T10:00:30Z'
              samples:
                - recordedAt: '2026-03-30T10:00:05Z'
                  lat: 33.5138
                  lng: 36.2765
                  speed: 24
                  heading: 140
                  accuracy: 8
                  altitude: 650
      responses:
        '200':
          description: Batch stored and processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTrackingBatchResponse'
        '400':
          $ref: '#/components/responses/Error400'
        '401':
          $ref: '#/components/responses/Error401'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/mobile/deactivate:
    post:
      tags: [Mobile Tracking]
      summary: Deactivate mobile tracking bindings for the authenticated supervisor
      operationId: deactivateMobileTracking
      security:
        - bearerAuth: []
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileDeactivateRequest'
      responses:
        '200':
          description: Deactivation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileDeactivateResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/bindings/{id}/revoke:
    post:
      tags: [Tracking Admin]
      summary: Revoke a tracking binding
      operationId: revokeTrackingBinding
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Binding revoked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeTrackingBindingResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '404':
          $ref: '#/components/responses/Error404'
        '500':
          $ref: '#/components/responses/Error500'

  /api/tracking/overview:
    get:
      tags: [Tracking Admin]
      summary: Get tracking dashboard overview
      operationId: getTrackingOverview
      security:
        - sessionCookieAuth: []
        - secureSessionCookieAuth: []
      parameters:
        - in: query
          name: branchId
          schema:
            type: string
        - in: query
          name: organizationId
          schema:
            type: string
        - in: query
          name: bindingsLimit
          schema:
            type: integer
        - in: query
          name: messagesLimit
          schema:
            type: integer
      responses:
        '200':
          description: Tracking overview payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackingOverviewResponse'
        '401':
          $ref: '#/components/responses/Error401'
        '403':
          $ref: '#/components/responses/Error403'
        '500':
          $ref: '#/components/responses/Error500'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: MobileAuthToken
    trackingTokenHeader:
      type: apiKey
      in: header
      name: X-Tracking-Token
      description: Legacy tracking token returned by `/api/tracking/mobile/activate`
    sessionCookieAuth:
      type: apiKey
      in: cookie
      name: next-auth.session-token
    secureSessionCookieAuth:
      type: apiKey
      in: cookie
      name: __Secure-next-auth.session-token
  responses:
    Error400:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Ш§Щ„Ш·Щ„ШЁ ШәЩҠШұ ШөШ§Щ„Шӯ
            code: BAD_REQUEST
            status: 400
    Error401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: ЩҠШ¬ШЁ ШӘШіШ¬ЩҠЩ„ Ш§Щ„ШҜШ®ЩҲЩ„ ШЈЩҲЩ„Ш§ЩӢ
            code: MOBILE_AUTH_REQUIRED
            status: 401
    Error403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: ЩҮШ°ЩҮ Ш§Щ„ЩҲШ§Ш¬ЩҮШ© Щ…ШӘШ§ШӯШ© Щ„Щ…ШҙШұЩҒ Ш§Щ„Ш®Ш· ЩҒЩӮШ·
            code: MOBILE_ROLE_NOT_ALLOWED
            status: 403
    Error404:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Ш§Щ„Щ…ЩҲШұШҜ Ш§Щ„Щ…Ш·Щ„ЩҲШЁ ШәЩҠШұ Щ…ЩҲШ¬ЩҲШҜ
            code: NOT_FOUND
            status: 404
    Error500:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: ШӯШҜШ« Ш®Ш·ШЈ ШәЩҠШұ Щ…ШӘЩҲЩӮШ№ ЩҒЩҠ Ш§Щ„Ш®Ш§ШҜЩ…
            code: INTERNAL_SERVER_ERROR
            status: 500
  schemas:
    ErrorResponse:
      type: object
      required: [message, code, status]
      properties:
        message:
          type: string
        code:
          type: string
        status:
          type: integer

    MobileLoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    MobileLoginUser:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email:
          type: string
          format: email
        role: { type: string }
        organizationId:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        trackingVehicleId:
          type: [string, 'null']
    MobileLineSupervisorUser:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        email:
          type: string
          format: email
        role: { type: string }
        organizationId:
          type: [string, 'null']
        branchId:
          type: [string, 'null']
        trackingVehicleId:
          type: [string, 'null']
        isActive:
          type: boolean
    MobileProfileOrganization:
      type: [object, 'null']
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
    MobileProfileBranch:
      type: [object, 'null']
      properties:
        id: { type: string }
        name: { type: string }
        nameAr:
          type: [string, 'null']
        branchTypeLabel:
