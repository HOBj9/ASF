# Nginx config for wms.alather.net -> Waste Management System (port 3036)
# SSL with Let's Encrypt (certbot)
#
# First-time SSL setup:
#   A) If you don't have a certificate yet, temporarily use only the HTTP server block
#      (comment out the "Redirect HTTP to HTTPS" block and the whole HTTPS server block),
#      reload nginx, then run:
#      sudo certbot certonly --webroot -w /var/www/html -d wms.alather.net
#      (or: sudo certbot certonly --nginx -d wms.alather.net)
#   B) Then uncomment everything and use this full config.
#
# Deploy:
#   sudo cp nginx-wms.alather.net.conf /etc/nginx/sites-available/wms.alather.net
#   sudo ln -sf /etc/nginx/sites-available/wms.alather.net /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Renewal: sudo certbot renew (via cron or systemd timer)

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name wms.alather.net;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wms.alather.net;

    # Avoid HTTP 431 (Request Header Fields Too Large) - NextAuth JWT session cookie can be very large
    client_header_buffer_size 32k;
    large_client_header_buffers 8 64k;

    # Let's Encrypt (certbot)
    ssl_certificate     /etc/letsencrypt/live/wms.alather.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wms.alather.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    location / {
        proxy_pass http://127.0.0.1:3036;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
        proxy_connect_timeout 60;
        proxy_send_timeout 60;
        proxy_buffering off;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }
}
